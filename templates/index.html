<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sierra 7 - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: white; overflow: hidden; position: relative;
        }
        .particles { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: 0; }
        .particle { position: absolute; background: rgba(220, 20, 60, 0.1); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        .particle:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 60px; height: 60px; left: 80%; animation-delay: 2s; }
        .particle:nth-child(3) { width: 100px; height: 100px; left: 50%; animation-delay: 4s; }
        .particle:nth-child(4) { width: 40px; height: 40px; left: 30%; animation-delay: 6s; }
        .particle:nth-child(5) { width: 70px; height: 70px; left: 70%; animation-delay: 8s; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; } 50% { transform: translateY(-100vh) rotate(360deg); opacity: 1; } }
        .main-container {
            position: relative; z-index: 1; background: rgba(26, 26, 46, 0.7); backdrop-filter: blur(20px);
            padding: 60px 50px; border-radius: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05), inset 0 0 60px rgba(220, 20, 60, 0.05);
            text-align: center; min-width: 450px; animation: slideUp 0.6s ease-out; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .logo { width: 80px; height: 80px; margin: 0 auto 30px; background: linear-gradient(135deg, #dc143c 0%, #ff1744 100%); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; box-shadow: 0 10px 30px rgba(220, 20, 60, 0.3); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        h1 { font-size: 38px; margin-bottom: 12px; color: #ffffff; font-weight: 800; letter-spacing: -1px; }
        .subtitle { font-size: 18px; color: rgba(255, 255, 255, 0.7); margin-bottom: 40px; font-weight: 400; }
        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        .legal {
            margin-top: 18px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }
        .legal a {
            color: #ff1744;
            text-decoration: underline;
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="main-container">
        <div class="logo">S7</div>
        <h1>Sierra 7</h1>
        <p class="subtitle">Welcome to SCP - Sierra 7.</p>
        <div class="footer">
            Copyright Sierra 7 2026 &copy; All rights reserved
        </div>
        <div class="legal">
            Legal:
            <a href="/privacy">Privacy Policy</a> |
            <a href="/terms">Terms of Service</a>
        </div>
    </div>
</body>
</html>
