<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sierra 7 - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: white;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .particles { position: absolute; width: 100vw; height: 100vh; overflow: hidden; z-index: 0; top: 0; left: 0; }
        .particle { position: absolute; background: rgba(220, 20, 60, 0.08); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        .particle:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 60px; height: 60px; left: 80%; animation-delay: 2s; }
        .particle:nth-child(3) { width: 100px; height: 100px; left: 50%; animation-delay: 4s; }
        .particle:nth-child(4) { width: 40px; height: 40px; left: 30%; animation-delay: 6s; }
        .particle:nth-child(5) { width: 70px; height: 70px; left: 70%; animation-delay: 8s; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; } 50% { transform: translateY(-100vh) rotate(360deg); opacity: 1; } }
        .header {
            width: 100%;
            background: transparent;
            padding: 32px 0 24px 0;
            text-align: center;
            z-index: 2;
            position: relative;
        }
        .tabbar {
            position: absolute;
            top: 32px;
            right: 48px;
            background: rgba(0,0,0,0.55);
            border-radius: 18px;
            padding: 8px 28px;
            display: flex;
            gap: 32px;
            z-index: 10;
            box-shadow: 0 2px 16px 0 rgba(0,0,0,0.08);
        }
        .tabbar a {
            color: #fff;
            font-weight: 700;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 1px;
            padding: 4px 0;
            transition: border-bottom 0.2s, color 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tabbar a:hover {
            border-bottom: 2px solid #fff;
            color: #fff;
        }
        .logo {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            display: inline-block;
            margin-bottom: 8px;
        }
        .title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 0;
        }
        .spacer {
            flex: 1 1 auto;
        }
        .footer {
            width: 100%;
            background: #13132a;
            border-top: 1px solid rgba(255,255,255,0.07);
            padding: 32px 0 0 0;
            color: rgba(255,255,255,0.7);
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 32px;
        }
        .footer-section {
            margin-bottom: 24px;
        }
        .footer-section h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #fff;
            letter-spacing: 1px;
        }
        .footer-section ul {
            list-style: none;
            padding: 0;
        }
        .footer-section ul li {
            margin-bottom: 8px;
        }
        .footer-section a {
            color: #ff1744;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .footer-section a:hover {
            color: #fff;
        }
        .footer-bottom {
            text-align: center;
            margin-top: 24px;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.4);
            padding-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="header">
        <div class="tabbar">
            <a href="/">Home</a>
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
        </div>
        <div class="logo">S7</div>
        <div class="title">Sierra 7</div>
        <div class="subtitle">Welcome to SCP - Sierra 7.</div>
    </div>
    <div class="spacer"></div>
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>SIERRA 7</h3>
                <div style="max-width:320px;color:rgba(255,255,255,0.7);font-size:1rem;">Next-generation technology platform delivering secure and modern solutions for the future.</div>
            </div>
            <div class="footer-section">
                <h3>LEGAL</h3>
                <ul>
                    <li><a href="/privacy">Privacy Policy</a></li>
                    <li><a href="/terms">Terms of Service</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; Sierra 7 2026. All rights reserved.
        </div>
    </footer>
</body>
</html>
