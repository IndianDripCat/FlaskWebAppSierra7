<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .checkmark {
            width: 80px;
            height: 80px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #ff1744 100%);
            border-radius: 50%;
            box-shadow: 0 8px 32px rgba(220, 20, 60, 0.2);
            animation: pop 0.6s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .checkmark svg {
            width: 48px;
            height: 48px;
            color: #fff;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 16px;
            color: #fff;
        }
        .subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
        }
        .close-tab {
            background: linear-gradient(135deg, #dc143c 0%, #ff1744 100%);
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 4px 20px rgba(220, 20, 60, 0.3);
            transition: background 0.2s;
        }
        .close-tab:hover {
            background: linear-gradient(135deg, #ff1744 0%, #dc143c 100%);
        }
    </style>
</head>
<body>
    <div class="checkmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" stroke="currentColor" fill="none"/>
            <path d="M16 8l-5.5 7-2.5-3" stroke="currentColor"/>
        </svg>
    </div>
    <h1>Verification Complete</h1>
    <div class="subtitle">You can now close this tab.</div>
    <button class="close-tab" onclick="window.close()">Close Tab</button>
</body>
</html>
